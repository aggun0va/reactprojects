<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Store</title>
  </head>
  <body>
    <script>
      const api = 'http://localhost:5000/api';

      fetch(api, {
        method: 'GET',
      })
        .then((res) => {
          console.log('Response status:', res.status);
          return res.json();
        })
        // .then((res) => res.json())
        .then((data) => console.log(data))
        .catch((err) => console.log(err));
    </script>
  </body>
</html>
